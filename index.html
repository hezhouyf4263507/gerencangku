        // CRUD Operations
        function getData(key) {
            return JSON.parse(localStorage.getItem(key) || '[]');
        }
        
        function setData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }
        
        // ==================== 数据备份 ====================
        function exportData() {
            const data = {
                vehicles: getData(DB_KEYS.vehicles),
                usage: getData(DB_KEYS.usage),
                maintenance: getData(DB_KEYS.maintenance),
                exportTime: new Date().toISOString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `车辆管理备份_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出', 'success');
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.vehicles) setData(DB_KEYS.vehicles, data.vehicles);
                        if (data.usage) setData(DB_KEYS.usage, data.usage);
                        if (data.maintenance) setData(DB_KEYS.maintenance, data.maintenance);
                        showToast('数据已导入，请刷新页面', 'success');
                        setTimeout(() => location.reload(), 1500);
                    } catch (err) {
                        showToast('导入失败：文件格式错误', 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        // ==================== Navigation ====================
        function switchSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');
            
            // Load section data
            if (sectionId === 'dashboard') renderDashboard();
            else if (sectionId === 'vehicles') renderVehicles();
            else if (sectionId === 'usage') renderUsage();
            else if (sectionId === 'maintenance') renderMaintenance();
        }
        
        // ==================== Dashboard ====================
        function renderDashboard() {
            const vehicles = getData(DB_KEYS.vehicles);
            const usage = getData(DB_KEYS.usage);
            const maintenance = getData(DB_KEYS.maintenance);
            
            const totalVehicles = vehicles.length;
            const availableVehicles = vehicles.filter(v => v.status === '可用').length;
            const inUseVehicles = vehicles.filter(v => v.status === '使用中').length;
            const underRepair = vehicles.filter(v => v.status === '维修中').length;
            
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();
            
            const thisMonthUsage = usage.filter(u => {
                const d = new Date(u.startTime);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            }).length;
            
            const thisMonthCost = maintenance
                .filter(m => {
                    const d = new Date(m.date);
                    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
                })
                .reduce((sum, m) => sum + (parseFloat(m.cost) || 0), 0);
            
            // 计算未报销费用
            const unpaidCost = usage
                .filter(u => u.reimburseStatus !== '已报销')
                .reduce((sum, u) => {
                    return sum + (parseFloat(u.parking) || 0)
                        + (parseFloat(u.fuel) || 0)
                        + (parseFloat(u.toll) || 0)
                        + (parseFloat(u.carWash) || 0)
                        + (parseFloat(u.meal) || 0);
                }, 0);
            const unpaidCount = usage.filter(u => u.reimburseStatus !== '已报销').length;
            
            // Stats Grid
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalVehicles}</div>
                    <div class="stat-label">车辆总数</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value">${availableVehicles}</div>
                    <div class="stat-label">可用车辆</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value">${inUseVehicles}</div>
                    <div class="stat-label">使用中</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value">${underRepair}</div>
                    <div class="stat-label">维修中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${thisMonthUsage}</div>
                    <div class="stat-label">本月用车</div>
                    <div class="stat-change up">↑ ${Math.round(thisMonthUsage / 12)}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">¥${thisMonthCost.toLocaleString()}</div>
                    <div class="stat-label">本月维修费</div>
                </div>
                <div class="stat-card warning" onclick="switchSection('usage'); document.getElementById('usageReimburseFilter').value='未报销'; filterUsage();">
                    <div class="stat-value">¥${unpaidCost.toLocaleString()}</div>
                    <div class="stat-label">待报销费用</div>
                    <div class="stat-change">${unpaidCount}笔未报</div>
                </div>
            `;
            
            // Usage Chart (Last 6 months)
            const months = [];
            const usageData = [];
            for (let i = 5; i >= 0; i--) {
                const d = new Date(thisYear, thisMonth - i, 1);
                const monthStr = `${d.getMonth() + 1}月`;
                const count = usage.filter(u => {
                    const ud = new Date(u.startTime);
                    return ud.getMonth() === d.getMonth() && ud.getFullYear() === d.getFullYear();
                }).length;
                months.push(monthStr);
                usageData.push(count);
            }
            const maxUsage = Math.max(...usageData, 1);
            
            document.getElementById('usageChart').innerHTML = usageData.map((count, i) => `
                <div class="bar-item">
                    <span class="bar-label">${months[i]}</span>
                    <div class="bar-track">
                        <div class="bar-fill primary" style="width: ${(count/maxUsage)*100}%">${count}次</div>
                    </div>
                </div>
            `).join('');
            
            // Cost Chart (Last 6 months)
            const costData = [];
            for (let i = 5; i >= 0; i--) {
                const d = new Date(thisYear, thisMonth - i, 1);
                const cost = maintenance
                    .filter(m => {
                        const md = new Date(m.date);
                        return md.getMonth() === d.getMonth() && md.getFullYear() === d.getFullYear();
                    })
                    .reduce((sum, m) => sum + (parseFloat(m.cost) || 0), 0);
                costData.push(cost);
            }
            const maxCost = Math.max(...costData, 1);
            
            document.getElementById('costChart').innerHTML = costData.map((cost, i) => `
                <div class="bar-item">
                    <span class="bar-label">${months[i]}</span>
                    <div class="bar-track">
                        <div class="bar-fill danger" style="width: ${(cost/maxCost)*100}%">¥${cost.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            
            // Unpaid Cost Chart (Last 6 months)
            const unpaidData = [];
            for (let i = 5; i >= 0; i--) {
                const d = new Date(thisYear, thisMonth - i, 1);
                const nextMonth = new Date(thisYear, thisMonth - i + 1, 1);
                const cost = usage
                    .filter(u => {
                        const ud = new Date(u.startTime);
                        return ud >= d && ud < nextMonth && u.reimburseStatus !== '已报销';
                    })
                    .reduce((sum, u) => sum + (parseFloat(u.parking) || 0)
                        + (parseFloat(u.fuel) || 0)
                        + (parseFloat(u.toll) || 0)
                        + (parseFloat(u.carWash) || 0)
                        + (parseFloat(u.meal) || 0), 0);
                unpaidData.push(cost);
            }
            const maxUnpaid = Math.max(...unpaidData, 1);
            
            document.getElementById('unpaidChart').innerHTML = unpaidData.map((cost, i) => `
                <div class="bar-item">
                    <span class="bar-label">${months[i]}</span>
                    <div class="bar-track">
                        <div class="bar-fill purple" style="width: ${(cost/maxUnpaid)*100}%">¥${cost.toLocaleString()}</div>
                    </div>
                </div>
            `).join('');
            
            // Recent Activity
            const recentUsage = usage.slice(-3).reverse().map(u => ({
                type: 'use',
                icon: '🚗',
                title: `${u.plateNumber} - ${u.person}`,
                meta: `${u.destination} | ${u.startTime.slice(0,10)}`
            }));
            
            const recentMaintenance = maintenance.slice(-2).reverse().map(m => ({
                type: 'repair',
                icon: '🔧',
                title: `${m.plateNumber} - ${m.type}`,
                meta: `${m.content.slice(0,20)}... | ${m.date}`
            }));
            
            const recentActivity = [...recentUsage, ...recentMaintenance]
                .sort((a, b) => 0.5 - Math.random())
                .slice(0, 5);
            
            document.getElementById('recentActivity').innerHTML = recentActivity.length ? recentActivity.map(a => `
                <div class="activity-item">
                    <div class="activity-icon ${a.type}">${a.icon}</div>
                    <div class="activity-content">
                        <div class="activity-title">${a.title}</div>
                        <div class="activity-meta">${a.meta}</div>
                    </div>
                </div>
            `).join('') : '<div class="empty-state"><p>暂无最近动态</p></div>';
        }
        
        // ==================== Vehicles ====================
        function renderVehicles(page = 1) {
            const vehicles = getData(DB_KEYS.vehicles);
            const search = document.getElementById('vehicleSearch')?.value?.toLowerCase() || '';
            
            const filtered = vehicles.filter(v => 
                v.plateNumber.toLowerCase().includes(search) ||
                v.brandModel.toLowerCase().includes(search)
            );
            
            const pageSize = 10;
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (page - 1) * pageSize;
            const paged = filtered.slice(start, start + pageSize);
            
            document.getElementById('vehiclesTable').innerHTML = paged.length ? paged.map(v => `
                <tr>
                    <td><strong>${v.plateNumber}</strong></td>
                    <td>${v.brandModel}</td>
                    <td>${v.purchaseDate || '-'}</td>
                    <td><span class="badge ${v.status === '可用' ? 'badge-success' : v.status === '使用中' ? 'badge-warning' : v.status === '维修中' ? 'badge-danger' : 'badge-info'}">${v.status}</span></td>
                    <td>${v.totalMileage?.toLocaleString() || '-'}</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn btn-sm btn-secondary" onclick="editVehicle(${v.id})">编辑</button>
                            <button type="button" class="btn btn-sm btn-danger" onclick="deleteVehicle(${v.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="6"><div class="empty-state"><p>暂无车辆数据</p></div></td></tr>';
            
            window._vehiclePage = page;
            renderPagination('vehiclesPagination', page, totalPages, 'renderVehicles', '_vehiclePage');
        }
        
        function filterVehicles() {
            renderVehicles();
        }
        
        function openVehicleModal(id = null) {
            document.getElementById('vehicleForm').reset();
            document.getElementById('vehicleId').value = '';
            document.getElementById('vehicleModalTitle').textContent = id ? '编辑车辆' : '添加车辆';
            
            if (id) {
                const vehicles = getData(DB_KEYS.vehicles);
                const v = vehicles.find(x => x.id === id);
                if (v) {
                    document.getElementById('vehicleId').value = v.id;
                    document.getElementById('plateNumber').value = v.plateNumber;
                    document.getElementById('brandModel').value = v.brandModel;
                    document.getElementById('purchaseDate').value = v.purchaseDate;
                    document.getElementById('totalMileage').value = v.totalMileage;
                    document.getElementById('vehicleStatus').value = v.status;
                    document.getElementById('vehicleRemark').value = v.remark;
                }
            }
            
            openModal('vehicleModal');
        }
        
        function editVehicle(id) {
            openVehicleModal(id);
        }
        
        function saveVehicle() {
            const id = document.getElementById('vehicleId').value;
            const plateNumber = document.getElementById('plateNumber').value.trim();
            
            if (!plateNumber) {
                showToast('请输入车牌号', 'error');
                return;
            }
            
            const vehicles = getData(DB_KEYS.vehicles);
            
            const data = {
                id: id ? parseInt(id) : Date.now(),
                plateNumber,
                brandModel: document.getElementById('brandModel').value.trim(),
                purchaseDate: document.getElementById('purchaseDate').value,
                totalMileage: parseInt(document.getElementById('totalMileage').value) || 0,
                status: document.getElementById('vehicleStatus').value,
                remark: document.getElementById('vehicleRemark').value.trim()
            };
            
            if (id) {
                const idx = vehicles.findIndex(v => v.id === parseInt(id));
                if (idx !== -1) vehicles[idx] = data;
            } else {
                vehicles.push(data);
            }
            
            setData(DB_KEYS.vehicles, vehicles);
            closeModal('vehicleModal');
            renderVehicles();
            showToast(id ? '车辆已更新' : '车辆已添加', 'success');
        }
        
        function deleteVehicle(id) {
            if (!confirm('确定要删除这辆车的信息吗？')) return;
            
            const vehicles = getData(DB_KEYS.vehicles);
            const newVehicles = vehicles.filter(v => v.id !== id);
            setData(DB_KEYS.vehicles, newVehicles);
            showToast('车辆已删除', 'success');
            // Refresh the table
            if (typeof renderVehicles === 'function') {
                renderVehicles(window._vehiclePage || 1);
            }
        }
        
        // ==================== Usage ====================
        function populateVehicleSelects() {
            const vehicles = getData(DB_KEYS.vehicles);
            const availableVehicles = vehicles.filter(v => v.status !== '报废');
            const options = availableVehicles.map(v => `<option value="${v.id}">${v.plateNumber} - ${v.brandModel}</option>`).join('');
            
            document.getElementById('usageVehicle').innerHTML = options;
            document.getElementById('maintenanceVehicle').innerHTML = options;
        }
        
        function renderUsage(page = 1) {
            const usage = getData(DB_KEYS.usage);
            const search = document.getElementById('usageSearch')?.value?.toLowerCase() || '';
            const filter = document.getElementById('usageFilter')?.value || '';
            const reimburseFilter = document.getElementById('usageReimburseFilter')?.value || '';
            
            const filtered = usage.filter(u => {
                const matchSearch = u.plateNumber.toLowerCase().includes(search) ||
                    u.person.toLowerCase().includes(search) ||
                    u.destination.toLowerCase().includes(search);
                const matchFilter = !filter || u.status === filter;
                const matchReimburse = !reimburseFilter || (u.reimburseStatus || '未报销') === reimburseFilter;
                return matchSearch && matchFilter && matchReimburse;
            }).sort((a, b) => new Date(b.startTime) - new Date(a.startTime));
            
            const pageSize = 10;
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (page - 1) * pageSize;
            const paged = filtered.slice(start, start + pageSize);
            
            if (!paged.length) {
                document.getElementById('usageTable').innerHTML = '<tr><td colspan="8"><div class="empty-state"><p>暂无用车记录</p></div></td></tr>';
                window._usagePage = page;
                renderPagination('usagePagination', page, totalPages, 'renderUsage', '_usagePage');
                return;
            }
            
            const rows = paged.map(u => {
                const parking = parseFloat(u.parking) || 0;
                const fuel = parseFloat(u.fuel) || 0;
                const toll = parseFloat(u.toll) || 0;
                const carWash = parseFloat(u.carWash) || 0;
                const meal = parseFloat(u.meal) || 0;
                const totalCost = parking + fuel + toll + carWash + meal;
                const reimburseStatus = u.reimburseStatus || '未报销';
                const isReimbursed = reimburseStatus === '已报销';
                const distance = (u.endMileage && u.startMileage) ? (u.endMileage - u.startMileage) : null;
                
                // 费用明细标签
                const costTags = [];
                if (parking > 0) costTags.push(`<span class="cost-tag"><span class="cost-tag-label">停车</span>¥${parking.toFixed(2)}</span>`);
                if (fuel > 0) costTags.push(`<span class="cost-tag"><span class="cost-tag-label">加油</span>¥${fuel.toFixed(2)}</span>`);
                if (toll > 0) costTags.push(`<span class="cost-tag"><span class="cost-tag-label">高速</span>¥${toll.toFixed(2)}</span>`);
                if (carWash > 0) costTags.push(`<span class="cost-tag"><span class="cost-tag-label">洗车</span>¥${carWash.toFixed(2)}</span>`);
                if (meal > 0) costTags.push(`<span class="cost-tag"><span class="cost-tag-label">餐补</span>¥${meal.toFixed(2)}</span>`);
                if (totalCost > 0) costTags.push(`<span class="cost-tag cost-total-tag">合计 ¥${totalCost.toFixed(2)}</span>`);
                
                const mainRow = `
                    <tr class="usage-main-row" onclick="toggleUsageDetail(${u.id})">
                        <td><strong>${u.plateNumber}</strong></td>
                        <td>${u.person}${u.passengers ? `<br><span style="font-size:0.75rem;color:var(--gray-500)">乘：${u.passengers}</span>` : ''}</td>
                        <td>${u.startTime.replace('T', ' ')}</td>
                        <td>${u.destination}</td>
                        <td>${distance !== null ? distance + 'km' : '-'}</td>
                        <td>${totalCost > 0 ? '<span style="color:#1e40af;font-weight:600">¥' + totalCost.toFixed(2) + '</span>' : '<span style="color:var(--gray-400)">-</span>'}</td>
                        <td><span class="badge ${u.status === '已完成' ? 'badge-success' : 'badge-warning'}">${u.status}</span>
                            ${totalCost > 0 ? `<br><span class="badge ${isReimbursed ? 'badge-purple' : 'badge-gray'}" style="margin-top:3px">${reimburseStatus}</span>` : ''}
                        </td>
                        <td onclick="event.stopPropagation()">
                            <div class="action-btns">
                                ${totalCost > 0 && !isReimbursed
                                    ? `<button type="button" class="btn btn-sm btn-reimburse" onclick="markReimbursed(${u.id})">报销✓</button>`
                                    : ''
                                }
                                <button type="button" class="btn btn-sm btn-secondary" onclick="editUsage(${u.id})">编辑</button>
                                <button type="button" class="btn btn-sm btn-danger" onclick="deleteUsage(${u.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
                
                const detailRow = `
                    <tr class="usage-detail-row" id="detail-${u.id}">
                        <td colspan="8">
                            <div class="usage-detail-inner">
                                <div class="detail-grid">
                                    <div class="detail-item">
                                        <span class="detail-label">出发里程</span>
                                        <span class="detail-value">${u.startMileage ? u.startMileage.toLocaleString() + ' km' : '未填写'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">返回里程</span>
                                        <span class="detail-value">${u.endMileage ? u.endMileage.toLocaleString() + ' km' : '未填写'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">行驶里程</span>
                                        <span class="detail-value highlight">${distance !== null ? distance + ' km' : '未完成'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">结束时间</span>
                                        <span class="detail-value">${u.endTime ? u.endTime.replace('T', ' ') : '使用中'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">乘坐人</span>
                                        <span class="detail-value">${u.passengers || '<span style="color:var(--gray-400)">未填写</span>'}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">用车事由</span>
                                        <span class="detail-value">${u.reason || '-'}</span>
                                    </div>
                                </div>
                                ${totalCost > 0 ? `
                                <hr class="detail-divider">
                                <div class="detail-item" style="margin-bottom:0.5rem">
                                    <span class="detail-label">费用明细</span>
                                </div>
                                <div class="cost-breakdown">${costTags.join('')}</div>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
                
                return mainRow + detailRow;
            }).join('');
            
            document.getElementById('usageTable').innerHTML = rows;
            window._usagePage = page;
            renderPagination('usagePagination', page, totalPages, 'renderUsage', '_usagePage');
        }
        
        function toggleUsageDetail(id) {
            const mainRow = document.querySelector(`.usage-main-row[onclick="toggleUsageDetail(${id})"]`);
            const detailRow = document.getElementById(`detail-${id}`);
            if (!mainRow || !detailRow) return;
            const isExpanded = mainRow.classList.contains('expanded');
            // 折叠所有
            document.querySelectorAll('.usage-main-row.expanded').forEach(r => r.classList.remove('expanded'));
            document.querySelectorAll('.usage-detail-row.show').forEach(r => r.classList.remove('show'));
            // 如果之前是折叠的，则展开
            if (!isExpanded) {
                mainRow.classList.add('expanded');
                detailRow.classList.add('show');
            }
        }
        
        function filterUsage() {
            renderUsage();
        }
        
        function openUsageModal(id = null) {
            document.getElementById('usageForm').reset();
            document.getElementById('usageId').value = '';
            document.getElementById('usageModalTitle').textContent = id ? '编辑用车记录' : '登记用车';
            populateVehicleSelects();
            loadPersonHistory();
            
            if (id) {
                const usage = getData(DB_KEYS.usage);
                const u = usage.find(x => x.id === id);
                if (u) {
                    document.getElementById('usageId').value = u.id;
                    document.getElementById('usageVehicle').value = u.vehicleId;
                    document.getElementById('usagePerson').value = u.person;
                    document.getElementById('usageStartTime').value = u.startTime;
                    document.getElementById('usageEndTime').value = u.endTime;
                    document.getElementById('usageDestination').value = u.destination;
                    document.getElementById('usageReason').value = u.reason;
                    document.getElementById('usageStartMileage').value = u.startMileage;
                    document.getElementById('usageEndMileage').value = u.endMileage;
                    document.getElementById('usagePassengers').value = u.passengers || '';
                    document.getElementById('usageParking').value = u.parking || '';
                    document.getElementById('usageFuel').value = u.fuel || '';
                    document.getElementById('usageToll').value = u.toll || '';
                    document.getElementById('usageCarWash').value = u.carWash || '';
                    document.getElementById('usageMeal').value = u.meal || '';
                    document.getElementById('usageStatus').value = u.status;
                    document.getElementById('usageReimburseStatus').value = u.reimburseStatus || '未报销';
                }
            }
            
            openModal('usageModal');
        }
        
        function loadPersonHistory() {
            const usage = getData(DB_KEYS.usage);
            const persons = [...new Set(usage.map(u => u.person).filter(p => p))];
            const datalist = document.getElementById('personHistory');
            datalist.innerHTML = persons.map(p => `<option value="${p}">`).join('');
        }
        
        function editUsage(id) {
            openUsageModal(id);
        }
        
        function saveUsage() {
            const id = document.getElementById('usageId').value;
            const vehicleId = parseInt(document.getElementById('usageVehicle').value);
            const person = document.getElementById('usagePerson').value.trim();
            const startTime = document.getElementById('usageStartTime').value;
            
            if (!vehicleId || !person || !startTime) {
                showToast('请填写必填项', 'error');
                return;
            }
            
            const vehicles = getData(DB_KEYS.vehicles);
            const vehicle = vehicles.find(v => v.id === vehicleId);
            
            const usage = getData(DB_KEYS.usage);
            
            const data = {
                id: id ? parseInt(id) : Date.now(),
                vehicleId,
                plateNumber: vehicle?.plateNumber || '',
                person,
                startTime,
                endTime: document.getElementById('usageEndTime').value,
                destination: document.getElementById('usageDestination').value.trim(),
                reason: document.getElementById('usageReason').value.trim(),
                startMileage: parseInt(document.getElementById('usageStartMileage').value) || 0,
                endMileage: parseInt(document.getElementById('usageEndMileage').value) || 0,
                passengers: document.getElementById('usagePassengers').value.trim(),
                parking: parseFloat(document.getElementById('usageParking').value) || 0,
                fuel: parseFloat(document.getElementById('usageFuel').value) || 0,
                toll: parseFloat(document.getElementById('usageToll').value) || 0,
                carWash: parseFloat(document.getElementById('usageCarWash').value) || 0,
                meal: parseFloat(document.getElementById('usageMeal').value) || 0,
                status: document.getElementById('usageStatus').value,
                reimburseStatus: document.getElementById('usageReimburseStatus').value
            };
            
            if (id) {
                const idx = usage.findIndex(u => u.id === parseInt(id));
                if (idx !== -1) usage[idx] = data;
            } else {
                usage.push(data);
            }
            
            // Update vehicle status
            const status = data.status === '已完成' ? '可用' : '使用中';
            const vehicleIdx = vehicles.findIndex(v => v.id === vehicleId);
            if (vehicleIdx !== -1) {
                vehicles[vehicleIdx].status = status;
                // Update mileage
                if (data.endMileage > vehicles[vehicleIdx].totalMileage) {
                    vehicles[vehicleIdx].totalMileage = data.endMileage;
                }
                setData(DB_KEYS.vehicles, vehicles);
            }
            
            setData(DB_KEYS.usage, usage);
            closeModal('usageModal');
            renderUsage();
            showToast(id ? '记录已更新' : '用车已登记', 'success');
        }
        
        function deleteUsage(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const usage = getData(DB_KEYS.usage);
            const newUsage = usage.filter(u => u.id !== id);
            setData(DB_KEYS.usage, newUsage);
            showToast('记录已删除', 'success');
            if (typeof renderUsage === 'function') {
                renderUsage(window._usagePage || 1);
            }
        }
        
        function markReimbursed(id) {
            const usage = getData(DB_KEYS.usage);
            const idx = usage.findIndex(u => u.id === id);
            if (idx !== -1) {
                usage[idx].reimburseStatus = '已报销';
                setData(DB_KEYS.usage, usage);
                showToast('已标记为已报销 ✓', 'success');
                renderUsage(window._usagePage || 1);
            }
        }
        
        // ==================== Maintenance ====================
        function renderMaintenance(page = 1) {
            const maintenance = getData(DB_KEYS.maintenance);
            const search = document.getElementById('maintenanceSearch')?.value?.toLowerCase() || '';
            const filter = document.getElementById('maintenanceFilter')?.value || '';
            
            const filtered = maintenance.filter(m => {
                const matchSearch = m.plateNumber.toLowerCase().includes(search) ||
                    m.content.toLowerCase().includes(search);
                const matchFilter = !filter || m.type === filter;
                return matchSearch && matchFilter;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const pageSize = 10;
            const totalPages = Math.ceil(filtered.length / pageSize);
            const start = (page - 1) * pageSize;
            const paged = filtered.slice(start, start + pageSize);
            
            document.getElementById('maintenanceTable').innerHTML = paged.length ? paged.map(m => `
                <tr>
                    <td><strong>${m.plateNumber}</strong></td>
                    <td><span class="badge ${m.type === '保养' ? 'badge-success' : m.type === '维修' ? 'badge-danger' : 'badge-info'}">${m.type}</span></td>
                    <td>${m.date}</td>
                    <td>${m.content}</td>
                    <td>¥${parseFloat(m.cost || 0).toLocaleString()}</td>
                    <td>${m.vendor || '-'}</td>
                    <td>
                        <div class="action-btns">
                            <button type="button" class="btn btn-sm btn-secondary" onclick="editMaintenance(${m.id})">编辑</button>
                            <button type="button" class="btn btn-sm btn-danger" onclick="deleteMaintenance(${m.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="7"><div class="empty-state"><p>暂无维修记录</p></div></td></tr>';
            
            window._maintenancePage = page;
            renderPagination('maintenancePagination', page, totalPages, 'renderMaintenance', '_maintenancePage');
        }
        
        function filterMaintenance() {
            renderMaintenance();
        }
        
        function openMaintenanceModal(id = null) {
            document.getElementById('maintenanceForm').reset();
            document.getElementById('maintenanceId').value = '';
            document.getElementById('maintenanceModalTitle').textContent = id ? '编辑维修记录' : '登记维修保养';
            populateVehicleSelects();
            
            if (id) {
                const maintenance = getData(DB_KEYS.maintenance);
                const m = maintenance.find(x => x.id === id);
                if (m) {
                    document.getElementById('maintenanceId').value = m.id;
                    document.getElementById('maintenanceVehicle').value = m.vehicleId;
                    document.getElementById('maintenanceType').value = m.type;
                    document.getElementById('maintenanceDate').value = m.date;
                    document.getElementById('maintenanceCost').value = m.cost;
                    document.getElementById('maintenanceContent').value = m.content;
                    document.getElementById('maintenanceVendor').value = m.vendor;
                    document.getElementById('maintenanceRemark').value = m.remark;
                }
            }
            
            openModal('maintenanceModal');
        }
        
        function editMaintenance(id) {
            openMaintenanceModal(id);
        }
        
        function saveMaintenance() {
            const id = document.getElementById('maintenanceId').value;
            const vehicleId = parseInt(document.getElementById('maintenanceVehicle').value);
            const type = document.getElementById('maintenanceType').value;
            const date = document.getElementById('maintenanceDate').value;
            const content = document.getElementById('maintenanceContent').value.trim();
            
            if (!vehicleId || !type || !date || !content) {
                showToast('请填写必填项', 'error');
                return;
            }
            
            const vehicles = getData(DB_KEYS.vehicles);
            const vehicle = vehicles.find(v => v.id === vehicleId);
            
            const maintenance = getData(DB_KEYS.maintenance);
            
            const data = {
                id: id ? parseInt(id) : Date.now(),
                vehicleId,
                plateNumber: vehicle?.plateNumber || '',
                type,
                date,
                cost: parseFloat(document.getElementById('maintenanceCost').value) || 0,
                content,
                vendor: document.getElementById('maintenanceVendor').value.trim(),
                remark: document.getElementById('maintenanceRemark').value.trim()
            };
            
            if (id) {
                const idx = maintenance.findIndex(m => m.id === parseInt(id));
                if (idx !== -1) maintenance[idx] = data;
            } else {
                maintenance.push(data);
            }
            
            // Update vehicle status (if repair, mark as under repair; if completed, mark as available)
            if (type === '维修') {
                const vehicleIdx = vehicles.findIndex(v => v.id === vehicleId);
                if (vehicleIdx !== -1) {
                    vehicles[vehicleIdx].status = '维修中';
                    setData(DB_KEYS.vehicles, vehicles);
                }
            }
            
            setData(DB_KEYS.maintenance, maintenance);
            closeModal('maintenanceModal');
            renderMaintenance();
            showToast(id ? '记录已更新' : '维修已登记', 'success');
        }
        
        function deleteMaintenance(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const maintenance = getData(DB_KEYS.maintenance);
            const newMaintenance = maintenance.filter(m => m.id !== id);
            setData(DB_KEYS.maintenance, newMaintenance);
            showToast('记录已删除', 'success');
            if (typeof renderMaintenance === 'function') {
                renderMaintenance(window._maintenancePage || 1);
            }
        }
        
        // ==================== Modal & UI Helpers ====================
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
            document.body.style.overflow = '';
        }
        
        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
            });
        });
        
        function renderPagination(containerId, current, total, callbackName, pageVar) {
            const container = document.getElementById(containerId);
            if (total <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            if (current > 1) {
                html += `<button class="page-btn" data-page="${current - 1}" data-callback="${callbackName}">上一页</button>`;
            }
            
            for (let i = 1; i <= total; i++) {
                if (i === 1 || i === total || (i >= current - 1 && i <= current + 1)) {
                    html += `<button class="page-btn ${i === current ? 'active' : ''}" data-page="${i}" data-callback="${callbackName}">${i}</button>`;
                } else if (i === current - 2 || i === current + 2) {
                    html += `<span class="page-info">...</span>`;
                }
            }
            
            if (current < total) {
                html += `<button class="page-btn" data-page="${current + 1}" data-callback="${callbackName}">下一页</button>`;
            }
            
            container.innerHTML = html;
            // Bind click events
            container.querySelectorAll('button[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = parseInt(btn.dataset.page);
                    window[pageVar] = page;
                    window[btn.dataset.callback](page);
                });
            });
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✓' : type === 'error' ? '✗' : 'ℹ'}</span>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function toggleMenu() {
            document.querySelector('.nav-content').classList.toggle('show');
        }
        
        // ==================== Initialize ====================
        document.addEventListener('DOMContentLoaded', () => {
            initializeSampleData();
            renderDashboard();
        });
    </script>
</body>
